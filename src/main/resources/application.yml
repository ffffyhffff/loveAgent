spring:
  application:
    name: ai-chat

  # PostgreSQL 数据源（请修改为你的配置）
  datasource:
    url: jdbc:postgresql://localhost:5432/aichat
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8123
  servlet:
    context-path: /api

# AI 配置
ai:
  dashscope:
    # 阿里云百炼 API Key（请替换为你自己的）
    api-key: sk-a4cab39af09642a5af177d62966a4236
    model: qwen-plus

# 日志
logging:
  level:
    com.aichat: DEBUG

# 高德地图
amap:
  # 后端 Web服务 Key
  api-key: fc6e8b9ea28cb5312650b2eef0fe32c0
  # 前端 Web端 Key（用于 JS API 地图展示）
  web-key: 94601f2760428adee8c2ae25f257280e
